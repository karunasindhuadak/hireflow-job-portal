<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50">
  <defs>
    <!-- Primary cyan gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b8d4"/>
    </linearGradient>
    <!-- Coral accent gradient -->
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff8a80"/>
    </linearGradient>
    <!-- Underline gradient: cyan to coral -->
    <linearGradient id="underlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== ICON: Stylized "H" with flow arrow ===== -->
  <g filter="url(#glow)" transform="translate(2, 5)">
    <!-- Left pillar -->
    <rect x="0" y="3" width="6" height="34" rx="3" fill="url(#cyanGrad)"/>
    <!-- Right pillar -->
    <rect x="20" y="3" width="6" height="34" rx="3" fill="url(#cyanGrad)"/>
    <!-- Crossbar -->
    <rect x="6" y="15.5" width="14" height="6" rx="3" fill="url(#cyanGrad)"/>
    
    <!-- Upward flow arrow (coral accent) -->
    <path d="M33 25 L33 9" stroke="url(#coralGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M28 14.5 L33 8 L38 14.5" stroke="url(#coralGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Motion trail dots -->
    <circle cx="33" cy="30" r="1.8" fill="#ff6b6b" opacity="0.5"/>
    <circle cx="33" cy="35" r="1.2" fill="#ff6b6b" opacity="0.25"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <!-- "Hire" in white/light -->
  <text x="50" y="35" font-family="'Outfit', 'Segoe UI', 'Arial', sans-serif" font-size="30" font-weight="700" fill="#f0f4f8" letter-spacing="-0.5">Hire</text>
  <!-- "Flow" in cyan -->
  <text x="116" y="35" font-family="'Outfit', 'Segoe UI', 'Arial', sans-serif" font-size="30" font-weight="700" fill="#00e5ff" letter-spacing="-0.5">Flow</text>

  <!-- ===== Accent underline ===== -->
  <rect x="50" y="42" width="48" height="2.5" rx="1.25" fill="url(#underlineGrad)" opacity="0.55"/>
</svg>
